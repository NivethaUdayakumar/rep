<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dept Score Cards (10 depts)</title>
<style>
  :root{
    --bg:#f7f9fc; --ink:#0f172a; --muted:#475569; --card:#ffffff; --line:#e2e8f0;
    --accent:#2563eb; --good:#16a34a; --fair:#f59e0b; --poor:#dc2626;
    --radius:14px; --shadow:0 8px 24px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Arial}
  header{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;padding:20px 24px}
  header h1{margin:0;font-size:18px}
  .toolbar{display:flex;gap:10px}
  .toolbar input[type="search"], .toolbar select{
    padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);
  }
  .grid{display:grid;gap:16px;padding:0 24px 24px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:16px 16px 12px;display:flex;flex-direction:column;gap:10px
  }
  .dept{font-weight:800;font-size:20px;letter-spacing:.2px}
  .meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .badge{font-size:11px;font-weight:700;border:1px solid var(--line);border-radius:999px;padding:2px 8px;color:var(--muted);background:#f8fafc}
  .kv{display:grid;grid-template-columns:1fr auto;gap:6px 10px;align-items:center;border:1px solid var(--line);
      border-radius:10px;padding:8px 10px;background:#fafafa}
  .kv .key{color:var(--muted);font-weight:600}
  .kv .val{font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:600}
  .scoreRow{display:flex;flex-direction:column;gap:8px;margin-top:2px}
  .scoreTop{display:flex;align-items:center;gap:10px}
  .scoreNum{font-weight:800}
  .indicator{font-size:12px;font-weight:800;border-radius:999px;padding:4px 10px;border:1px solid}
  .indicator.good{color:var(--good);border-color:var(--good);background:rgba(22,163,74,.08)}
  .indicator.fair{color:var(--fair);border-color:var(--fair);background:rgba(245,158,11,.10)}
  .indicator.poor{color:var(--poor);border-color:var(--poor);background:rgba(220,38,38,.10)}
  .bar{height:10px;border-radius:999px;background:#eef2f7;border:1px solid var(--line);overflow:hidden}
  .bar > span{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#60a5fa)}
  .footer{margin-top:6px;color:var(--muted);font-size:12px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>

<header>
  <h1>Department Score Cards</h1>
  <div class="toolbar">
    <input id="q" type="search" placeholder="Search departments…" />
    <select id="sort">
      <option value="dept-asc">Sort: Dept ↑</option>
      <option value="dept-desc">Sort: Dept ↓</option>
      <option value="score-desc" selected>Sort: Score ↓</option>
      <option value="score-asc">Sort: Score ↑</option>
      <option value="time-desc">Sort: Updated ↓</option>
      <option value="time-asc">Sort: Updated ↑</option>
    </select>
  </div>
</header>

<div id="grid" class="grid" role="list"></div>

<script>
/* ==================== Sample JSON with 10 departments ==================== */
const data = {
  "Sales": {
    "Leads": 220, "Wins": 68, "Quota": 80, "ChurnPct": 6.2,
    "Region":"APAC","PipelineMM": 4.3, "updatedAt": "2025-09-17T12:40:21.000Z"
  },
  "R&D": {
    "OpenBugs": 28, "CriticalBugs": 3, "Velocity": 42, "CoveragePct": 84,
    "Release":"1.17.3","updatedAt": "2025-09-17T12:35:00.000Z"
  },
  "Ops": {
    "Incidents": 3, "MTTR_min": 24, "SLA99_pct": 99.8, "ChangeFailPct": 2.4,
    "Region":"Global","updatedAt": "2025-09-17T12:20:29.155Z"
  },
  "Finance": {
    "CloseDays": 4, "ForecastAccPct": 93, "OverrunPct": 1.8, "DSO_days": 38,
    "Quarter":"FY25-Q3","updatedAt": "2025-09-17T11:59:13.000Z"
  },
  "HR": {
    "Headcount": 480, "OpenRoles": 26, "TimeToHire_days": 24, "AttritionPct": 9.1, "eNPS": 42,
    "updatedAt": "2025-09-17T12:10:00.000Z"
  },
  "Marketing": {
    "MQLs": 3100, "CPL_usd": 18.5, "CTR_pct": 2.9, "ConvRate_pct": 4.1,
    "Campaigns": 12, "updatedAt": "2025-09-17T12:25:50.000Z"
  },
  "Support": {
    "Tickets": 820, "FCR_pct": 74, "CSAT_pct": 89, "Backlog": 65, "AHT_min": 9.2,
    "updatedAt": "2025-09-17T12:33:00.000Z"
  },
  "Security": {
    "OpenFindings": 14, "CriticalFindings": 1, "PatchCompliance_pct": 96, "MeanTTP_days": 5,
    "PhishFail_pct": 2.8, "updatedAt": "2025-09-17T12:05:40.000Z"
  },
  "IT": {
    "Uptime_pct": 99.93, "Tickets": 210, "Satisfaction_pct": 92, "DeployFreq_wk": 18,
    "ChangeFail_pct": 3.2, "updatedAt": "2025-09-17T12:44:20.000Z"
  },
  "Logistics": {
    "OTD_pct": 94, "Damage_pct": 0.7, "CostPerShip_usd": 7.8, "AvgLead_days": 4.2,
    "Backorders": 11, "updatedAt": "2025-09-17T12:48:55.000Z"
  }
};

/* ==================== Scoring functions (0–100) ==================== */
const SCORERS = {
  // 1) Sales: reward quota attainment, penalize churn; slight lift for pipeline.
  "Sales": (s) => {
    const quotaAttain = pct(num(s.Wins), Math.max(1, num(s.Quota))) * 100; // 0..100+
    const churnPenalty = clamp(num(s.ChurnPct) * 2.5, 0, 50);
    const pipeBoost = clamp(num(s.PipelineMM) * 2, 0, 10);
    return clamp(quotaAttain - churnPenalty + pipeBoost, 0, 100);
  },

  // 2) R&D: velocity & coverage help; critical and open bugs hurt.
  "R&D": (s) => {
    const v = clamp((num(s.Velocity) / 50) * 45, 0, 45);
    const cov = clamp((num(s.CoveragePct) / 100) * 35, 0, 35);
    const crit = clamp(num(s.CriticalBugs) * 12, 0, 48);
    const open = clamp(num(s.OpenBugs) * 0.6, 0, 30);
    return clamp(v + cov - crit - open, 0, 100);
  },

  // 3) Ops/SRE: start from SLA, subtract MTTR, CFR, and incident penalties.
  "Ops": (s) => {
    const slaBase = clamp((num(s.SLA99_pct) - 95) * 6, 0, 120);
    const mttrPenalty = clamp(num(s.MTTR_min) * 0.7, 0, 50);
    const cfrPenalty = clamp(num(s.ChangeFailPct) * 4.5, 0, 50);
    const incPenalty = clamp(num(s.Incidents) * 4, 0, 40);
    return clamp(slaBase - mttrPenalty - cfrPenalty - incPenalty, 0, 100);
  },

  // 4) Finance: faster close, accurate forecast, low overrun, reasonable DSO win.
  "Finance": (s) => {
    const close = clamp((10 - num(s.CloseDays)) * 6, 0, 60);     // 10 days→0, 0 days→60
    const forecast = clamp(num(s.ForecastAccPct) * 0.3, 0, 30);  // 100%→30
    const overrun = clamp((10 - num(s.OverrunPct)) * 2, 0, 20);  // 0%→20, 10%→0
    const dsoAdj = clamp((60 - num(s.DSO_days)) * 0.5, -10, 20); // 30–60 sweet spot
    return clamp(close + forecast + overrun + dsoAdj, 0, 100);
  },

  // 5) HR: eNPS high is good; lower attrition & time-to-hire better; too many open roles hurts.
  "HR": (s) => {
    const enps = clamp((num(s.eNPS) + 50) * 0.6, 0, 60);           // -50..50 → 0..60
    const attr = clamp((20 - num(s.AttritionPct)) * 1.5, 0, 30);   // 0%→30
    const tth  = clamp((45 - num(s.TimeToHire_days)) * 0.6, 0, 27);
    const openRolesPenalty = clamp(num(s.OpenRoles) * 0.4, 0, 20);
    return clamp(enps + attr + tth - openRolesPenalty, 0, 100);
  },

  // 6) Marketing: lower CPL is good, higher CTR & conversion are good; more campaigns slight boost.
  "Marketing": (s) => {
    const cpl = clamp((40 - num(s.CPL_usd)) * 1.2, 0, 48);
    const ctr = clamp(num(s.CTR_pct) * 6, 0, 36);
    const cr  = clamp(num(s.ConvRate_pct) * 7, 0, 49);
    const campBoost = clamp(num(s.Campaigns) * 0.8, 0, 12);
    return clamp(cpl + ctr + cr + campBoost, 0, 100);
  },

  // 7) Support: FCR & CSAT help; backlog and AHT hurt; ticket volume normalized.
  "Support": (s) => {
    const fcr = clamp(num(s.FCR_pct) * 0.5, 0, 50);
    const csat = clamp(num(s.CSAT_pct) * 0.4, 0, 40);
    const backlogPenalty = clamp(num(s.Backlog) * 0.2, 0, 25);
    const ahtPenalty = clamp(num(s.AHT_min) * 1.5, 0, 30);
    return clamp(fcr + csat - backlogPenalty - ahtPenalty, 0, 100);
  },

  // 8) Security: high patch compliance good; fewer criticals/open findings; faster mean time to patch.
  "Security": (s) => {
    const patch = clamp((num(s.PatchCompliance_pct) - 80) * 2, 0, 40);
    const critical = clamp(num(s.CriticalFindings) * 18, 0, 72);
    const open = clamp(num(s.OpenFindings) * 1.2, 0, 36);
    const mttp = clamp((30 - num(s.MeanTTP_days)) * 1.2, 0, 36);
    const phish = clamp((10 - num(s.PhishFail_pct)) * 2.0, 0, 20);
    return clamp(patch + mttp + phish - critical - open + 30, 0, 100);
  },

  // 9) IT (platform): uptime & satisfaction help; change-fail hurts; deploy frequency gives lift.
  "IT": (s) => {
    const uptime = clamp((num(s.Uptime_pct) - 99) * 12, 0, 72);
    const sat = clamp(num(s.Satisfaction_pct) * 0.3, 0, 30);
    const cf = clamp(num(s.ChangeFail_pct) * 4.5, 0, 45);
    const freq = clamp(num(s.DeployFreq_wk) * 1.2, 0, 24);
    return clamp(uptime + sat + freq - cf, 0, 100);
  },

  // 10) Logistics: OTD↑, Damage↓, lower cost, shorter lead, fewer backorders are better.
  "Logistics": (s) => {
    const otd = clamp(num(s.OTD_pct) * 0.6, 0, 60);
    const dmg = clamp((2 - num(s.Damage_pct)) * 10, 0, 20);              // 0%→20, 2%→0
    const cost = clamp((15 - num(s.CostPerShip_usd)) * 1.2, 0, 18);
    const lead = clamp((10 - num(s.AvgLead_days)) * 2.0, 0, 20);
    const boPenalty = clamp(num(s.Backorders) * 0.8, 0, 20);
    return clamp(otd + dmg + cost + lead - boPenalty, 0, 100);
  },

  // Fallback (not used here but kept for extensibility)
  "__default__": (s) => {
    const nums = Object.values(s).map(num).filter(n => Number.isFinite(n));
    if (!nums.length) return 50;
    const avg = nums.reduce((a,b)=>a+b,0)/nums.length;
    return clamp(60 + (50 - clamp(avg, 0, 50)), 0, 100);
  }
};

/* ==================== Utilities ==================== */
function num(x){ const n = Number(x); return Number.isFinite(n) ? n : NaN; }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function pct(a,b){ return b === 0 ? 0 : a / b; }
function indicator(score){
  if (score >= 75) return { cls:'good', label:'Good' };
  if (score >= 50) return { cls:'fair', label:'Fair' };
  return { cls:'poor', label:'Poor' };
}
function fmtTime(iso){
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString(undefined, {year:'numeric', month:'short', day:'2-digit', hour:'2-digit', minute:'2-digit'});
}

/* ==================== Transform & render ==================== */
const gridEl = document.getElementById('grid');
const qEl = document.getElementById('q');
const sortEl = document.getElementById('sort');

function toRows(obj){
  const keys = Object.keys(obj).filter(k => k !== 'updatedAt');
  keys.sort((a,b)=>{
    const na = parseInt(String(a).replace(/\D/g,''),10), nb = parseInt(String(b).replace(/\D/g,''),10);
    if (!Number.isNaN(na) && !Number.isNaN(nb)) return na - nb;
    return a.localeCompare(b);
  });
  return keys.map(k => ({ key:k, val:String(obj[k]) }));
}

function scoreFor(dept, stats){
  const fn = SCORERS[dept] || SCORERS["__default__"];
  return clamp(Math.round(fn(stats)), 0, 100);
}

function normalizeEntries(dataObj){
  return Object.entries(dataObj).map(([dept, stats]) => {
    const score = scoreFor(dept, stats);
    return {
      dept,
      rows: toRows(stats),
      updatedAt: stats.updatedAt || null,
      updatedNum: stats.updatedAt ? Date.parse(stats.updatedAt) : 0,
      score,
      ind: indicator(score)
    };
  });
}

let entries = normalizeEntries(data);

function applySort(arr, mode){
  const a = [...arr];
  if (mode === 'dept-asc') a.sort((x,y)=>x.dept.localeCompare(y.dept, undefined, {numeric:true}));
  if (mode === 'dept-desc') a.sort((x,y)=>y.dept.localeCompare(x.dept, undefined, {numeric:true}));
  if (mode === 'score-desc') a.sort((x,y)=>y.score - x.score);
  if (mode === 'score-asc') a.sort((x,y)=>x.score - y.score);
  if (mode === 'time-desc') a.sort((x,y)=>y.updatedNum - x.updatedNum);
  if (mode === 'time-asc') a.sort((x,y)=>x.updatedNum - y.updatedNum);
  return a;
}

function render(){
  const query = (qEl.value || '').trim().toLowerCase();
  const mode = sortEl.value;
  const sorted = applySort(entries, mode);

  gridEl.innerHTML = '';
  for (const e of sorted) {
    if (query && !e.dept.toLowerCase().includes(query)) continue;

    const card = document.createElement('article');
    card.className = 'card';
    card.setAttribute('role','listitem');
    card.innerHTML = `
      <div class="dept" title="${e.dept}">${e.dept}</div>
      <div class="meta">
        <span class="badge">Score model: ${SCORERS[e.dept] ? e.dept : 'default'}</span>
        <span class="badge">${e.rows.length} fields</span>
      </div>

      <div class="scoreRow">
        <div class="scoreTop">
          <div class="scoreNum">${e.score}/100</div>
          <span class="indicator ${e.ind.cls}">${e.ind.label}</span>
        </div>
        <div class="bar" aria-label="Score progress"><span style="width:${e.score}%"></span></div>
      </div>

      <div class="body"></div>
      <div class="footer">
        <span>Last updated: ${fmtTime(e.updatedAt)}</span>
      </div>
    `;
    const body = card.querySelector('.body');
    for (const r of e.rows) {
      const row = document.createElement('div'); row.className='kv';
      row.innerHTML = `<div class="key">${r.key}</div><div class="val" title="${r.val}">${r.val}</div>`;
      body.appendChild(row);
    }
    gridEl.appendChild(card);
  }

  if (!gridEl.children.length) {
    const empty = document.createElement('div');
    empty.style.color = 'var(--muted)';
    empty.textContent = 'No departments match your search.';
    gridEl.appendChild(empty);
  }
}

qEl.addEventListener('input', render);
sortEl.addEventListener('change', render);
render();

/* ===== Extend: add a new department & scorer =====
data["Procurement"] = { "POs": 1200, "SpendMM": 9.4, "Savings_pct": 6.2, "CycleTime_days": 7, "updatedAt": new Date().toISOString() };
SCORERS["Procurement"] = (s) => clamp(num(s.Savings_pct)*8 + clamp((15-num(s.CycleTime_days))*2,0,30) - clamp((num(s.SpendMM)-8)*1.2,0,20), 0, 100);
entries = normalizeEntries(data); render();
*/
</script>
</body>
</html>
