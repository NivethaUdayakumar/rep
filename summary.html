<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dept Score Cards (fetch from API)</title>
<style>
  :root{
    --bg:#f7f9fc; --ink:#0f172a; --muted:#475569; --card:#ffffff; --line:#e2e8f0;
    --accent:#2563eb; --good:#16a34a; --fair:#f59e0b; --poor:#dc2626;
    --radius:14px; --shadow:0 8px 24px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Arial}
  header{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;padding:20px 24px}
  header h1{margin:0;font-size:18px}
  .toolbar{display:flex;gap:10px}
  .toolbar input[type="search"], .toolbar select{
    padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);
  }
  .grid{display:grid;gap:16px;padding:0 24px 24px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
        padding:16px 16px 12px;display:flex;flex-direction:column;gap:10px}
  .dept{font-weight:800;font-size:20px;letter-spacing:.2px}
  .meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .badge{font-size:11px;font-weight:700;border:1px solid var(--line);border-radius:999px;padding:2px 8px;color:var(--muted);background:#f8fafc}
  .kv{display:grid;grid-template-columns:1fr auto;gap:6px 10px;align-items:center;border:1px solid var(--line);
      border-radius:10px;padding:8px 10px;background:#fafafa}
  .kv .key{color:var(--muted);font-weight:600}
  .kv .val{font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:600}
  .scoreRow{display:flex;flex-direction:column;gap:8px;margin-top:2px}
  .scoreTop{display:flex;align-items:center;gap:10px}
  .scoreNum{font-weight:800}
  .indicator{font-size:12px;font-weight:800;border-radius:999px;padding:4px 10px;border:1px solid}
  .indicator.good{color:var(--good);border-color:var(--good);background:rgba(22,163,74,.08)}
  .indicator.fair{color:var(--fair);border-color:var(--fair);background:rgba(245,158,11,.10)}
  .indicator.poor{color:var(--poor);border-color:var(--poor);background:rgba(220,38,38,.10)}
  .bar{height:10px;border-radius:999px;background:#eef2f7;border:1px solid var(--line);overflow:hidden}
  .bar > span{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#60a5fa)}
  .footer{margin-top:6px;color:var(--muted);font-size:12px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>

<header>
  <h1>Department Score Cards</h1>
  <div class="toolbar">
    <input id="q" type="search" placeholder="Search departments…" />
    <select id="sort">
      <option value="dept-asc">Sort: Dept ↑</option>
      <option value="dept-desc">Sort: Dept ↓</option>
      <option value="score-desc" selected>Sort: Score ↓</option>
      <option value="score-asc">Sort: Score ↑</option>
      <option value="time-desc">Sort: Updated ↓</option>
      <option value="time-asc">Sort: Updated ↑</option>
    </select>
  </div>
</header>

<div id="grid" class="grid" role="list"></div>

<script>
/* ---------- Scoring functions (same as before; keep/edit as needed) ---------- */
const SCORERS = {
  "Sales": (s) => clamp(pct(num(s.Wins), Math.max(1, num(s.Quota))) * 100 - clamp(num(s.ChurnPct)*2.5,0,50) + clamp(num(s.PipelineMM)*2,0,10), 0, 100),
  "R&D":   (s) => clamp(clamp((num(s.Velocity)/50)*45,0,45) + clamp((num(s.CoveragePct)/100)*35,0,35) - clamp(num(s.CriticalBugs)*12,0,48) - clamp(num(s.OpenBugs)*0.6,0,30), 0, 100),
  "Ops":   (s) => clamp(clamp((num(s.SLA99_pct)-95)*6,0,120) - clamp(num(s.MTTR_min)*0.7,0,50) - clamp(num(s.ChangeFailPct)*4.5,0,50) - clamp(num(s.Incidents)*4,0,40), 0, 100),
  "Finance": (s)=> clamp(clamp((10-num(s.CloseDays))*6,0,60) + clamp(num(s.ForecastAccPct)*0.3,0,30) + clamp((10-num(s.OverrunPct))*2,0,20) + clamp((60-num(s.DSO_days))*0.5,-10,20), 0, 100),
  "HR":    (s) => clamp(clamp((num(s.eNPS)+50)*0.6,0,60) + clamp((20-num(s.AttritionPct))*1.5,0,30) + clamp((45-num(s.TimeToHire_days))*0.6,0,27) - clamp(num(s.OpenRoles)*0.4,0,20), 0, 100),
  "Marketing": (s)=> clamp(clamp((40-num(s.CPL_usd))*1.2,0,48) + clamp(num(s.CTR_pct)*6,0,36) + clamp(num(s.ConvRate_pct)*7,0,49) + clamp(num(s.Campaigns)*0.8,0,12), 0, 100),
  "Support": (s)=> clamp(clamp(num(s.FCR_pct)*0.5,0,50) + clamp(num(s.CSAT_pct)*0.4,0,40) - clamp(num(s.Backlog)*0.2,0,25) - clamp(num(s.AHT_min)*1.5,0,30), 0, 100),
  "Security":(s)=> clamp(clamp((num(s.PatchCompliance_pct)-80)*2,0,40) + clamp((30-num(s.MeanTTP_days))*1.2,0,36) + clamp((10-num(s.PhishFail_pct))*2,0,20) - clamp(num(s.CriticalFindings)*18,0,72) - clamp(num(s.OpenFindings)*1.2,0,36) + 30, 0, 100),
  "IT":     (s)=> clamp(clamp((num(s.Uptime_pct)-99)*12,0,72) + clamp(num(s.Satisfaction_pct)*0.3,0,30) + clamp(num(s.DeployFreq_wk)*1.2,0,24) - clamp(num(s.ChangeFail_pct)*4.5,0,45), 0, 100),
  "Logistics":(s)=> clamp(clamp(num(s.OTD_pct)*0.6,0,60) + clamp((2-num(s.Damage_pct))*10,0,20) + clamp((15-num(s.CostPerShip_usd))*1.2,0,18) + clamp((10-num(s.AvgLead_days))*2.0,0,20) - clamp(num(s.Backorders)*0.8,0,20), 0, 100),
  "__default__": (s) => {
    const nums = Object.values(s).map(num).filter(Number.isFinite);
    if (!nums.length) return 50;
    const avg = nums.reduce((a,b)=>a+b,0)/nums.length;
    return clamp(60 + (50 - clamp(avg, 0, 50)), 0, 100);
  }
};

/* ---------- Utils ---------- */
function num(x){ const n = Number(x); return Number.isFinite(n) ? n : NaN; }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function pct(a,b){ return b === 0 ? 0 : a / b; }
function indicator(score){
  if (score >= 75) return { cls:'good', label:'Good' };
  if (score >= 50) return { cls:'fair', label:'Fair' };
  return { cls:'poor', label:'Poor' };
}
function fmtTime(iso){
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString(undefined, {year:'numeric', month:'short', day:'2-digit', hour:'2-digit', minute:'2-digit'});
}
function toRows(obj){
  const keys = Object.keys(obj).filter(k => k !== 'updatedAt' && k !== 'dept' && k !== 'department' && k !== 'name');
  keys.sort((a,b)=>{
    const na = parseInt(String(a).replace(/\D/g,''),10), nb = parseInt(String(b).replace(/\D/g,''),10);
    if (!Number.isNaN(na) && !Number.isNaN(nb)) return na - nb;
    return a.localeCompare(b);
  });
  return keys.map(k => ({ key:k, val:String(obj[k]) }));
}
function scoreFor(dept, stats){
  const fn = SCORERS[dept] || SCORERS["__default__"];
  return clamp(Math.round(fn(stats)), 0, 100);
}

/* ---------- Normalize any plausible API payload ---------- */
/* Accepts:
   - { "Sales": {...}, "R&D": {...} }
   - [{ dept:"Sales", updatedAt:"...", ... }, ...]
   - { data: <either of the above> }
*/
function normalizeFromApi(payload){
  const root = ('data' in payload) ? payload.data : payload;

  // Case A: array of records
  if (Array.isArray(root)) {
    return root.map(rec => {
      const dept = rec.dept || rec.department || rec.name || 'Unknown';
      // stats = everything except dept keys
      const { dept:_, department:__, name:___, ...stats } = rec;
      const rows = toRows(stats);
      const updatedAt = rec.updatedAt || stats.updatedAt || null;
      const updatedNum = updatedAt ? Date.parse(updatedAt) : 0;
      const score = scoreFor(dept, stats);
      return { dept, rows, updatedAt, updatedNum, score, ind: indicator(score) };
    });
  }

  // Case B: object keyed by dept
  if (root && typeof root === 'object') {
    return Object.entries(root).map(([dept, stats]) => {
      stats = stats || {};
      const rows = toRows(stats);
      const updatedAt = stats.updatedAt || null;
      const updatedNum = updatedAt ? Date.parse(updatedAt) : 0;
      const score = scoreFor(dept, stats);
      return { dept, rows, updatedAt, updatedNum, score, ind: indicator(score) };
    });
  }

  // Fallback: nothing parsable
  return [];
}

/* ---------- Rendering ---------- */
const gridEl = document.getElementById('grid');
const qEl = document.getElementById('q');
const sortEl = document.getElementById('sort');

let entries = []; // single authoritative variable (no re-declare anywhere)

function applySort(arr, mode){
  const a = [...arr];
  if (mode === 'dept-asc') a.sort((x,y)=>x.dept.localeCompare(y.dept, undefined, {numeric:true}));
  if (mode === 'dept-desc') a.sort((x,y)=>y.dept.localeCompare(x.dept, undefined, {numeric:true}));
  if (mode === 'score-desc') a.sort((x,y)=>y.score - x.score);
  if (mode === 'score-asc') a.sort((x,y)=>x.score - y.score);
  if (mode === 'time-desc') a.sort((x,y)=>y.updatedNum - x.updatedNum);
  if (mode === 'time-asc') a.sort((x,y)=>x.updatedNum - y.updatedNum);
  return a;
}

function render(){
  const query = (qEl.value || '').trim().toLowerCase();
  const mode = sortEl.value;
  const sorted = applySort(entries, mode);

  gridEl.innerHTML = '';
  if (!sorted.length) {
    const empty = document.createElement('div');
    empty.style.color = 'var(--muted)';
    empty.textContent = 'No departments to display.';
    gridEl.appendChild(empty);
    return;
  }

  for (const e of sorted) {
    if (query && !e.dept.toLowerCase().includes(query)) continue;

    const card = document.createElement('article');
    card.className = 'card';
    card.setAttribute('role','listitem');
    card.innerHTML = `
      <div class="dept" title="${e.dept}">${e.dept}</div>
      <div class="meta">
        <span class="badge">Score model: ${SCORERS[e.dept] ? e.dept : 'default'}</span>
        <span class="badge">${e.rows.length} fields</span>
      </div>
      <div class="scoreRow">
        <div class="scoreTop">
          <div class="scoreNum">${e.score}/100</div>
          <span class="indicator ${e.ind.cls}">${e.ind.label}</span>
        </div>
        <div class="bar" aria-label="Score progress"><span style="width:${e.score}%"></span></div>
      </div>
      <div class="body"></div>
      <div class="footer"><span>Last updated: ${fmtTime(e.updatedAt)}</span></div>
    `;
    const body = card.querySelector('.body');
    for (const r of e.rows) {
      const row = document.createElement('div'); row.className='kv';
      row.innerHTML = `<div class="key">${r.key}</div><div class="val" title="${r.val}">${r.val}</div>`;
      body.appendChild(row);
    }
    gridEl.appendChild(card);
  }
}

/* ---------- Fetch JSON from API (supports array/object/wrapped) ---------- */
async function loadData(){
  try {
    const res = await fetch("api/summary", { headers: { "Accept": "application/json" } });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    const parsed = normalizeFromApi(json);
    console.log('[summary] raw:', json);
    console.log('[summary] parsed entries:', parsed);

    entries = parsed;      // <-- single assignment, no shadowing
    render();              // render AFTER entries is set
  } catch(err){
    console.error('Failed to load data:', err);
    gridEl.innerHTML = `<div style="color:#dc2626">Failed to load data: ${String(err)}</div>`;
  }
}

/* Wire events AFTER DOM is ready (we're at end of body, so it's fine) */
qEl.addEventListener('input', render);
sortEl.addEventListener('change', render);

/* Kick off */
loadData();
</script>
</body>
</html>
